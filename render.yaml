services:
  - type: web
    name: uagent
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: UAGENT_GATEWAY_PORT
        value: "8080"
      - key: UAGENT_STATE_DIR
        value: /data/.uagent
      - key: UAGENT_WORKSPACE_DIR
        value: /data/workspace
      - key: UAGENT_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: uagent-data
      mountPath: /data
      sizeGB: 1
